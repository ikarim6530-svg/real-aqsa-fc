    <!-- PAGE TITLE -->
    <section class="page-title">
        <h1>Register Your Interest</h1>
        <p>Want to join Real Aqsa FC? Fill out the form below.</p>
    </section>

   <!-- FORM -->
<section class="form-section">

    <form
        id="registerForm"
        action="https://formspree.io/f/mredypow"
        method="POST"
    >

        <div class="form-group">
            <label>Full Name</label>

            <input
                type="text"
                name="fullName"
                required
            >
        </div>

        <div class="form-group">
            <label>Date of Birth</label>

            <input
                type="date"
                name="dob"
                required
            >
        </div>

        <div class="form-group">
            <label>Phone Number</label>

            <input
                type="text"
                name="Phone Number"
                required
            >
        </div>

        <div class="form-group">
            <label>Preferred Position</label>

            <select
                name="position"
                required
            >
                <option value="">Select Position</option>
                <option>Goalkeeper</option>
                <option>Fullback</option>
                <option>Centre Back</option>
                <option>Centre Midfielder</option>
                <option>Winger</option>
                <option>Forward</option>
            </select>
        </div>

        <div class="form-group">
            <label>Previous Football Experience</label>

            <textarea
                rows="5"
                name="experience"
                placeholder="Tell us about your experience..."
            ></textarea>
        </div>

        <button type="submit">
            Submit Application
        </button>

        <p id="successMessage"></p>

    </form>

</section>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>Email: realaqsafc@yahoo.com</p>
        <p>Instagram: @realaqsafc</p>
    </footer>
